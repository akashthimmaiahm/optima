# Nginx config for the CENTRAL PORTAL EC2 (optima.sclera.com)
# Generated by setup.sh — do NOT edit manually, re-run setup.sh instead
# Placed at: /etc/nginx/sites-available/optima-portal

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name optima.sclera.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name optima.sclera.com;

    # SSL — managed by Certbot (auto-renewed)
    ssl_certificate     /etc/letsencrypt/live/optima.sclera.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/optima.sclera.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1024;

    # All traffic → central-server Node.js (port 3000)
    # Node handles: auth, portal API, proxy to property EC2s, and serves static frontend
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
