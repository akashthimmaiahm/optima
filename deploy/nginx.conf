# Nginx config for ONE Optima property EC2 instance.
# Replace PROPERTY_DOMAIN with the actual domain, e.g. acme.optima.sclera.com
# This file is placed at: /etc/nginx/sites-available/optima
# Then: sudo ln -s /etc/nginx/sites-available/optima /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name PROPERTY_DOMAIN;

    # Redirect all HTTP → HTTPS (after Certbot sets up SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name PROPERTY_DOMAIN;

    # SSL — managed by Certbot (auto-updated)
    ssl_certificate     /etc/letsencrypt/live/PROPERTY_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/PROPERTY_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;   # allow LLM queries up to 3 min
        proxy_send_timeout 180s;
    }

    # ── React Frontend (SPA) ──────────────────────────────────────────────────
    root /opt/optima/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the HTML entry point (SPA shell)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Health endpoint passthrough (no SSL redirect needed)
    location = /health {
        proxy_pass http://127.0.0.1:5000/api/health;
    }
}
