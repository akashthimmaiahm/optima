# Nginx config for ONE Optima PROPERTY backend EC2 (API-only, no frontend)
# e.g. hq.optima.sclera.com, acme.optima.sclera.com
# Generated by setup.sh — replace PROPERTY_DOMAIN with actual domain

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name PROPERTY_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name PROPERTY_DOMAIN;

    # SSL — managed by Certbot (auto-renewed)
    ssl_certificate     /etc/letsencrypt/live/PROPERTY_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/PROPERTY_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    gzip on;
    gzip_types application/json;

    # ── Backend API ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;   # LLM queries can take up to 3 min
        proxy_send_timeout 180s;
    }

    # Health endpoint (no auth needed for monitoring)
    location = /health {
        proxy_pass http://127.0.0.1:5000/api/health;
    }

    # Block all other paths — this is an API-only server
    location / {
        return 404 '{"error":"This endpoint is API-only"}';
        add_header Content-Type application/json;
    }
}
