# Nginx config for the CENTRAL PORTAL EC2 (optima.sclera.com)
# Placed at: /etc/nginx/sites-available/optima-portal

server {
    listen 80;
    server_name optima.sclera.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name optima.sclera.com;

    ssl_certificate     /etc/letsencrypt/live/optima.sclera.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/optima.sclera.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # All traffic → Node.js central server (port 4000)
    # The central server handles: auth, portal API, proxy to property EC2s, and static frontend
    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
